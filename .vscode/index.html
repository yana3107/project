<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="/bg.jpg" alt="Background Image">
        </div>
     
        <div class="right">
            <h2>Get iintoo it today</h2>
            <p class="sub">There is no charge or obligation upon registration.</p>
            <span class="buttons">
            <button class="fb">
                <img src="/facebook.svg" class="icon">
                Register with Facebook
            </button>

            <button class="in">
                <img src="/linkedin.svg" class="icon">
                Register with LinkedIn
            </button>
            </span>

            <p class="or">OR</p>
<span class="inputs">
            <input type="email" placeholder="Email">
            <input type="text" placeholder="Phone">
</span>

            <p class="title">What type of account do you want to create?</p>
            <div class="radio">
            <label>
                <input type="radio" name="type"> Individual
            </label>

            <label>
                <input type="radio" name="type"> Business
            </label>

            <label>
                <input type="radio" name="type"> IRA
            </label>

<label>
    <input type="radio" name="type"> Trust
</label>
<br><br>
</div>

            <button class="create">Create Account</button>
        </div>
        </div>
</body>
</html>
