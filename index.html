<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="./logo.svg" class="logo" alt="logo">
        </div>
     
        <div class="right">
            <form class="form">

            <h2>Get iintoo it today</h2>
            <p class="sub">There is no charge or obligation upon registration.</p>
          
            <div class="buttons">
            <button type="button" class="fb">
                <img src="./facebook.svg" class="icon">
                Register with Facebook
            </button>

            <button type="button" class="in">
                <img src="./linkedin.svg" class="icon">
                Register with LinkedIn
            </button>
            </div>

          <div class="divider">OR</div>

<div class="fields">
        <input type="email" placeholder="Email" class="text-input">
        <input type="text" placeholder="Phone" class="text-input">
      </div>

      <fieldset class="radio-group">
        <legend>What type of investor are you?</legend>

        <label><input type="radio" name="type"> Individual</label>
        <label><input type="radio" name="type"> Business</label>
        <label><input type="radio" name="type"> IRA</label>
        <label><input type="radio" name="type"> Trust</label>
      </fieldset>

      <div class="terms">
        <label>
          <input type="checkbox">
          I agree to the terms and receiving notifications 
          <a href="#">View full terms</a>
        </label>
      </div>

      <button type="submit" class="create">Create Account</button>

    </form>
  </div>

</div>

</body>
</html>
